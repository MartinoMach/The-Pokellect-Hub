name: Keep Azure Function Warm

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Also allows manual triggering

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Metadata Endpoint
        # Replace with your actual Azure Function URL once deployed
        run: |
          curl -f "https://pokellect-ebg2afesesh2hsd7.westus3-01.azurewebsites.net/api" || echo "Ping failed but workflow continues"