name: Node.js CI (Build & Test)

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Use the Node version your Azure Function runs on
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Checks
        run: npm test
