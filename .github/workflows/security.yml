name: Security Audit

on:
  workflow_dispatch:
  schedule: 
    - cron: '0 0 * * 1'
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Matches your Azure Functions Node version

      - name: Install Dependencies
        run: npm ci

      #Run the security audit
      - name: Audit NPM Packages
        run: npm audit --audit-level=high